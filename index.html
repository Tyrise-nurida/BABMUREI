<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국인의 밥상 - 식단 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍚 한국인의 밥상</h1>
            <p class="subtitle">오늘의 국과 반찬을 추천해드립니다.</p>
        </header>

        <main>
            <section class="controls">
                <div class="category-selector">
                    <label>
                        <input type="radio" name="category" value="general" checked>
                        <span>일반식</span>
                    </label>
                    <label>
                        <input type="radio" name="category" value="diet">
                        <span>다이어트식</span>
                    </label>
                </div>
                <button id="recommend-btn">메뉴 추천받기</button>
            </section>

            <section id="result" class="result-container hidden">
                <div class="meal-card">
                    <h2>오늘의 국/찌개 (1종)</h2>
                    <div id="soup-result" class="item-name"></div>
                </div>

                <div class="meal-card">
                    <h2>오늘의 반찬 (4종)</h2>
                    <ul id="side-results" class="side-list"></ul>
                </div>
                
                <button id="reset-btn" class="secondary-btn">다시 추천받기</button>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 한국인의 밥상 추천 서비스</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
